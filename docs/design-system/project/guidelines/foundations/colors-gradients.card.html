<!-- @dsCard group="Colors" viewport="700x160" name="Signature gradients" subtitle="Soft diagonal status washes + the progress gradient" -->
<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8" /><link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--surface-card); font-family: var(--font-body); }
  .wrap { padding: 22px 24px; display: flex; gap: 12px; }
  .sw { flex: 1; }
  .chip { height: 62px; border-radius: 14px; border: 1px solid rgba(0,0,0,.05); }
  .name { font-size: 11.5px; font-weight: 700; color: var(--ink-800); margin-top: 10px; }
  .use { font-size: 10.5px; color: var(--gray-400); margin-top: 3px; line-height: 1.35; }
</style></head>
<body><div class="wrap">
  <div class="sw"><div class="chip" style="background:var(--gradient-progress)"></div><div class="name">progress</div><div class="use">Progress bars, accents</div></div>
  <div class="sw"><div class="chip" style="background:var(--gradient-safe)"></div><div class="name">safe</div><div class="use">Protected panels</div></div>
  <div class="sw"><div class="chip" style="background:var(--gradient-warn)"></div><div class="name">warn</div><div class="use">Due-soon panels</div></div>
  <div class="sw"><div class="chip" style="background:var(--gradient-risk)"></div><div class="name">risk</div><div class="use">Missing-doc panels</div></div>
  <div class="sw"><div class="chip" style="background:var(--gradient-auth)"></div><div class="name">auth</div><div class="use">Login / onboarding bg</div></div>
</div></body></html>
