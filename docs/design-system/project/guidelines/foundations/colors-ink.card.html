<!-- @dsCard group="Colors" viewport="700x180" name="Ink & neutrals" subtitle="Navy-gray text scale — never pure black" -->
<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8" /><link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--surface-card); font-family: var(--font-body); }
  .wrap { padding: 22px 24px; display: flex; gap: 10px; }
  .sw { flex: 1; }
  .chip { height: 60px; border-radius: 12px; border: 1px solid var(--border-default); }
  .name { font-size: 11.5px; font-weight: 700; color: var(--ink-800); margin-top: 9px; }
  .hex { font-size: 10.5px; color: var(--gray-400); margin-top: 2px; }
  .use { font-size: 10px; color: var(--gray-400); margin-top: 4px; line-height: 1.35; }
</style></head>
<body><div class="wrap">
  <div class="sw"><div class="chip" style="background:var(--ink-900)"></div><div class="name">ink-900</div><div class="hex">#15212E</div><div class="use">Headlines, numbers</div></div>
  <div class="sw"><div class="chip" style="background:var(--ink-800)"></div><div class="name">ink-800</div><div class="hex">#1F2937</div><div class="use">Main text, titles</div></div>
  <div class="sw"><div class="chip" style="background:var(--ink-700)"></div><div class="name">ink-700</div><div class="hex">#374151</div><div class="use">Form labels</div></div>
  <div class="sw"><div class="chip" style="background:var(--ink-600)"></div><div class="name">ink-600</div><div class="hex">#5B6573</div><div class="use">Lead body</div></div>
  <div class="sw"><div class="chip" style="background:var(--gray-500)"></div><div class="name">gray-500</div><div class="hex">#6B7280</div><div class="use">Muted text</div></div>
  <div class="sw"><div class="chip" style="background:var(--gray-400)"></div><div class="name">gray-400</div><div class="hex">#9AA4B2</div><div class="use">Subtle, disabled</div></div>
  <div class="sw"><div class="chip" style="background:var(--gray-300)"></div><div class="name">gray-300</div><div class="hex">#CBD2DA</div><div class="use">Dots, dividers</div></div>
</div></body></html>
