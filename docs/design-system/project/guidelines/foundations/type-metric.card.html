<!-- @dsCard group="Type" viewport="700x200" name="Metrics — Rubik" subtitle="Money & numbers in the big boxes read precise, not playful" -->
<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8" /><link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--surface-card); font-family: var(--font-body); }
  .wrap { padding: 22px 26px; display: flex; align-items: center; gap: 30px; flex-wrap: wrap; }
  .big { font-family: var(--font-metric); font-weight: 700; letter-spacing: -1px; color: var(--ink-900); }
  .col { display: flex; flex-direction: column; gap: 4px; }
  .lab { font-size: 12px; font-weight: 700; color: var(--gray-500); }
  .meta { font-size: 12px; color: var(--gray-400); font-weight: 600; width: 100%; }
</style></head>
<body><div class="wrap">
  <div class="col"><span class="lab">Aid secured</span><span class="big" style="font-size:44px;color:var(--green-600)">$18,400</span></div>
  <div class="col"><span class="lab">Next deadline</span><span class="big" style="font-size:44px;color:var(--amber-600)">8 days</span></div>
  <div class="col"><span class="lab">FAFSA ready</span><span class="big" style="font-size:44px;color:var(--blue-700)">40%</span></div>
  <div class="meta">Rubik · 500 / 600 / 700 / 800 · for money, day-counts and percentages in stat boxes. Labels and greetings stay Nunito / Hanken.</div>
</div></body></html>
