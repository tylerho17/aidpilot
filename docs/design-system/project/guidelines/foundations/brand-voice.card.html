<!-- @dsCard group="Brand" viewport="700x250" name="Voice & tone" subtitle="Calm coach — plain, warm, second-person, never alarmist" -->
<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8" /><link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--surface-card); font-family: var(--font-body); }
  .wrap { padding: 20px 24px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .col h4 { font-size: 11px; font-weight: 800; letter-spacing: .6px; text-transform: uppercase; margin: 0 0 10px; }
  .yes h4 { color: var(--green-600); }
  .no h4 { color: var(--coral-600); }
  .line { display: flex; gap: 9px; font-size: 13.5px; line-height: 1.45; margin-bottom: 9px; color: var(--ink-700); font-weight: 500; }
  .mark { flex-shrink: 0; font-weight: 900; }
  .yes .mark { color: var(--green-600); }
  .no .mark { color: var(--coral-600); }
</style></head>
<body><div class="wrap">
  <div class="col yes">
    <h4>We say</h4>
    <div class="line"><span class="mark">✓</span><span>"Your aid is protected this week."</span></div>
    <div class="line"><span class="mark">✓</span><span>"One less thing to worry about."</span></div>
    <div class="line"><span class="mark">✓</span><span>"You're doing great, 2 to go."</span></div>
    <div class="line"><span class="mark">✓</span><span>"We found money for you this week."</span></div>
  </div>
  <div class="col no">
    <h4>We avoid</h4>
    <div class="line"><span class="mark">✕</span><span>"URGENT: Action required immediately."</span></div>
    <div class="line"><span class="mark">✕</span><span>"You failed to submit on time."</span></div>
    <div class="line"><span class="mark">✕</span><span>Jargon: "SAI", "verification hold"</span></div>
    <div class="line"><span class="mark">✕</span><span>Guarantees or hype 🎉🚀</span></div>
  </div>
</div></body></html>
