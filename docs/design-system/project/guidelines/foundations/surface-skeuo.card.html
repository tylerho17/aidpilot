<!-- @dsCard group="Surfaces" viewport="700x240" name="Skeuomorphism" subtitle="The marketing surface — paper, sticky notes, tape, stamps" -->
<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8" /><link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: radial-gradient(120% 100% at 20% 0%, #FBFAF6, #EFECE3); font-family: var(--font-body); }
  .wrap { padding: 28px 30px; display: flex; align-items: center; gap: 28px; }
  .paper { position: relative; width: 240px; background: repeating-linear-gradient(#fff 0, #fff 26px, #E4ECF7 27px, #fff 28px); border-radius: 6px; box-shadow: 0 1px 1px rgba(31,41,55,.05), 0 14px 26px -12px rgba(31,41,55,.28); transform: rotate(-2deg); padding: 18px 20px; }
  .paper h4 { font-family: var(--font-display); font-weight: 900; font-size: 16px; color: var(--ink-900); margin: 0 0 10px; }
  .item { display: flex; align-items: center; gap: 9px; padding: 4px 0; font-size: 14px; font-weight: 600; color: var(--ink-800); }
  .box { width: 18px; height: 18px; border-radius: 5px; border: 2px solid #C7D3E2; flex-shrink: 0; }
  .box.on { background: var(--green-600); border: none; }
  .tape { position: absolute; top: -11px; left: 50%; margin-left: -34px; width: 68px; height: 22px; background: rgba(255,247,230,.72); box-shadow: 0 1px 2px rgba(31,41,55,.12); transform: rotate(-2deg); }
  .sticky { width: 132px; min-height: 128px; background: #FFF3D6; padding: 20px 15px 14px; transform: rotate(5deg); box-shadow: 0 10px 20px -8px rgba(31,41,55,.28); position: relative; }
  .sticky .m { font-family: var(--font-metric); font-weight: 700; font-size: 28px; color: var(--green-600); letter-spacing: -.5px; }
  .stamp { display:inline-block; color: var(--green-600); border: 3px solid var(--green-600); border-radius: 8px; padding: 4px 11px; font-family: var(--font-display); font-weight: 900; font-size: 14px; letter-spacing: 1px; text-transform: uppercase; transform: rotate(-9deg); opacity: .82; margin-top: 8px; }
</style></head>
<body><div class="wrap">
  <div class="paper">
    <div class="tape"></div>
    <h4>My aid checklist</h4>
    <div class="item"><span class="box on"></span>Submit FAFSA</div>
    <div class="item"><span class="box on"></span>Verify identity</div>
    <div class="item"><span class="box"></span>Upload 2024 taxes</div>
    <div class="stamp">On track</div>
  </div>
  <div class="sticky" style="background:#FFF3D6">
    <div class="tape" style="background:rgba(255,247,230,.9)"></div>
    <div style="font-size:12px;font-weight:700;color:#8A6A22;margin-bottom:4px">found for you</div>
    <div class="m">$24,500</div>
    <div style="font-size:12px;font-weight:600;color:var(--gray-500);margin-top:2px">in scholarships</div>
  </div>
</div></body></html>
