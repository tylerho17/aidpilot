<!-- @dsCard group="Brand" viewport="700x220" name="Logo lockup" subtitle="Paper-plane mark + Aid/Pilot wordmark, on light & blue" -->
<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8" /><link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--surface-card); font-family: var(--font-body); }
  .wrap { padding: 24px; display: flex; gap: 16px; align-items: stretch; }
  .panel { flex: 1; border-radius: 18px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; padding: 28px 24px; }
  .light { background: var(--surface-page); border: 1px solid var(--border-card); }
  .blue { background: var(--blue-700); }
  .cap { font-size: 11px; font-weight: 700; letter-spacing: .4px; text-transform: uppercase; }
</style></head>
<body><div class="wrap">
  <div class="panel light">
    <img src="../../assets/aidpilot-logo.png" height="46" alt="AidPilot" />
    <span class="cap" style="color:var(--gray-400)">On light</span>
  </div>
  <div class="panel blue">
    <img src="../../assets/aidpilot-logo-white.png" height="46" alt="AidPilot" />
    <span class="cap" style="color:rgba(255,255,255,.6)">On brand</span>
  </div>
</div></body></html>
