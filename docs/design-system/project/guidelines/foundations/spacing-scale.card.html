<!-- @dsCard group="Spacing" viewport="700x180" name="Spacing scale" subtitle="Loose 2px rhythm — not a strict 8pt grid" -->
<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8" /><link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--surface-card); font-family: var(--font-body); }
  .wrap { padding: 22px 26px; display: flex; flex-direction: column; gap: 8px; }
  .row { display: flex; align-items: center; gap: 14px; }
  .bar { height: 16px; background: var(--blue-100); border-radius: 4px; }
  .lab { font-size: 11px; color: var(--gray-400); font-weight: 700; width: 120px; }
</style></head>
<body><div class="wrap">
  <div class="row"><span class="lab">2 · 6px</span><span class="bar" style="width:6px"></span></div>
  <div class="row"><span class="lab">4 · 10px</span><span class="bar" style="width:10px"></span></div>
  <div class="row"><span class="lab">6 · 14px</span><span class="bar" style="width:14px"></span></div>
  <div class="row"><span class="lab">8 · 18px</span><span class="bar" style="width:18px"></span></div>
  <div class="row"><span class="lab">10 · 24px</span><span class="bar" style="width:24px"></span></div>
  <div class="row"><span class="lab">14 · 34px</span><span class="bar" style="width:34px"></span></div>
  <div class="row"><span class="lab">16 · 40px</span><span class="bar" style="width:40px"></span></div>
  <div class="row"><span class="lab">24 · 60px</span><span class="bar" style="width:60px"></span></div>
</div></body></html>
