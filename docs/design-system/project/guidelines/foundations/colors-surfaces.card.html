<!-- @dsCard group="Colors" viewport="700x180" name="Surfaces & borders" subtitle="Calm off-white canvases and soft structural lines" -->
<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8" /><link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--surface-card); font-family: var(--font-body); }
  .wrap { padding: 22px 24px; display: flex; gap: 12px; }
  .sw { flex: 1; }
  .chip { height: 60px; border-radius: 12px; border: 1px solid var(--border-default); }
  .name { font-size: 11.5px; font-weight: 700; color: var(--ink-800); margin-top: 9px; }
  .hex { font-size: 10.5px; color: var(--gray-400); margin-top: 2px; }
  .use { font-size: 10px; color: var(--gray-400); margin-top: 4px; line-height: 1.35; }
</style></head>
<body><div class="wrap">
  <div class="sw"><div class="chip" style="background:var(--surface-page)"></div><div class="name">surface-page</div><div class="hex">#F9FAFB</div><div class="use">Marketing canvas</div></div>
  <div class="sw"><div class="chip" style="background:var(--surface-app)"></div><div class="name">surface-app</div><div class="hex">#F4F8FE</div><div class="use">App canvas (blue wash)</div></div>
  <div class="sw"><div class="chip" style="background:var(--white)"></div><div class="name">surface-card</div><div class="hex">#FFFFFF</div><div class="use">Cards — clarity</div></div>
  <div class="sw"><div class="chip" style="background:var(--border-default)"></div><div class="name">border-default</div><div class="hex">#E5E7EB</div><div class="use">Inputs, dividers</div></div>
  <div class="sw"><div class="chip" style="background:var(--border-card)"></div><div class="name">border-card</div><div class="hex">#E6EDF6</div><div class="use">Product card line</div></div>
</div></body></html>
