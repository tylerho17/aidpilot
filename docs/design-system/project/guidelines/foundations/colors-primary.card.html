<!-- @dsCard group="Colors" viewport="700x170" name="Primary blue" subtitle="The trust color — buttons, links, active nav" -->
<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8" /><link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--surface-card); font-family: var(--font-body); }
  .wrap { padding: 22px 24px; display: flex; gap: 12px; }
  .sw { flex: 1; }
  .chip { height: 66px; border-radius: 12px; border: 1px solid rgba(11,92,173,.08); }
  .name { font-size: 12px; font-weight: 700; color: var(--ink-800); margin-top: 10px; }
  .hex { font-size: 11px; color: var(--gray-400); font-family: var(--font-body); margin-top: 2px; letter-spacing: .2px; }
</style></head>
<body><div class="wrap">
  <div class="sw"><div class="chip" style="background:var(--blue-900)"></div><div class="name">blue-900</div><div class="hex">#094B8E</div></div>
  <div class="sw"><div class="chip" style="background:var(--blue-700)"></div><div class="name">blue-700 · primary</div><div class="hex">#0B5CAD</div></div>
  <div class="sw"><div class="chip" style="background:var(--blue-500)"></div><div class="name">blue-500</div><div class="hex">#3E86D6</div></div>
  <div class="sw"><div class="chip" style="background:var(--blue-300)"></div><div class="name">blue-300</div><div class="hex">#A9C7EE</div></div>
  <div class="sw"><div class="chip" style="background:var(--blue-200)"></div><div class="name">blue-200</div><div class="hex">#D7E7FB</div></div>
  <div class="sw"><div class="chip" style="background:var(--blue-100)"></div><div class="name">blue-100 · soft</div><div class="hex">#EAF3FF</div></div>
  <div class="sw"><div class="chip" style="background:var(--blue-50)"></div><div class="name">blue-50 · wash</div><div class="hex">#F4F8FE</div></div>
</div></body></html>
