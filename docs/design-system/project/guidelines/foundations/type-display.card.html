<!-- @dsCard group="Type" viewport="700x210" name="Display — Nunito" subtitle="Rounded, heavy, warm. Headlines, numbers, wordmark" -->
<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8" /><link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--surface-card); font-family: var(--font-body); }
  .wrap { padding: 22px 26px; }
  .huge { font-family: var(--font-display); font-weight: 900; font-size: 46px; letter-spacing: -1.4px; color: var(--ink-900); line-height: 1.04; margin: 0; }
  .huge .b { color: var(--blue-700); }
  .meta { font-size: 12px; color: var(--gray-400); margin-top: 16px; font-weight: 600; }
  .num { font-family: var(--font-display); font-weight: 900; font-size: 34px; color: var(--green-600); letter-spacing: -1px; }
</style></head>
<body><div class="wrap">
  <p class="huge">Financial aid,<br />finally <span class="b">on your side.</span></p>
  <div class="meta">Nunito · 700 / 800 / 900 · tight negative tracking · &nbsp;<span class="num">$18,400</span> &nbsp;numbers are always Nunito 900</div>
</div></body></html>
