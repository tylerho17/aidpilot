<!-- @dsCard group="Spacing" viewport="700x170" name="Corner radii" subtitle="Generously rounded — 8 to 24, plus full pills" -->
<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8" /><link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--surface-card); font-family: var(--font-body); }
  .wrap { padding: 22px 24px; display: flex; gap: 14px; align-items: flex-end; }
  .sw { text-align: center; }
  .box { width: 66px; height: 60px; background: var(--blue-100); border: 1.5px solid var(--blue-200); border-top-left-radius: var(--r); border-top-right-radius: var(--r); }
  .name { font-size: 11px; font-weight: 700; color: var(--ink-800); margin-top: 8px; }
  .val { font-size: 10px; color: var(--gray-400); margin-top: 1px; }
  .pill { width: 66px; height: 34px; background: var(--blue-700); border-radius: 999px; }
</style></head>
<body><div class="wrap">
  <div class="sw"><div class="box" style="--r:8px"></div><div class="name">xs</div><div class="val">8px</div></div>
  <div class="sw"><div class="box" style="--r:12px"></div><div class="name">sm</div><div class="val">12px</div></div>
  <div class="sw"><div class="box" style="--r:14px"></div><div class="name">md</div><div class="val">14px</div></div>
  <div class="sw"><div class="box" style="--r:18px"></div><div class="name">xl</div><div class="val">18px</div></div>
  <div class="sw"><div class="box" style="--r:20px"></div><div class="name">2xl</div><div class="val">20px</div></div>
  <div class="sw"><div class="box" style="--r:24px"></div><div class="name">3xl</div><div class="val">24px</div></div>
  <div class="sw"><div class="pill"></div><div class="name">pill</div><div class="val">999px</div></div>
</div></body></html>
