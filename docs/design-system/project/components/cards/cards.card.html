<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--surface-app); font-family: var(--font-body); }
  #root { padding: 24px; display: flex; flex-direction: column; gap: 16px; }
  .grid3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .lbl { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; color: var(--gray-400); }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { StatCard, IconTile, StatusPanel, FeatureCard } = window.AidPilotDesignSystem_59a3d7;
  function Demo() {
    return (
      <React.Fragment>
        <StatusPanel tone="green" icon="shield-check" eyebrow="Protected"
          title="Your aid is protected this week.">
          We watch your eligibility, enrollment, and requirements so surprises don't cost you money.
        </StatusPanel>
        <div className="grid3">
          <StatCard label="Aid secured" value="$18,400" sub="this year" />
          <StatCard label="Cal Grant renewal" value="8 days" valueColor="var(--amber-600)" sub="due soon" />
          <StatCard label="At risk" value="$0" valueColor="var(--green-600)" sub="nothing flagged" />
        </div>
        <div className="grid2">
          <FeatureCard icon="grid" tone="blue" title="Aid dashboard">
            See if your aid is protected and what's due soon.
          </FeatureCard>
          <FeatureCard icon="letter" tone="amber" title="Aid letter decoder" badge="Coming soon">
            Turn confusing grants and loans into a simple explanation.
          </FeatureCard>
        </div>
        <div style={{ display: "flex", gap: 12, alignItems: "center" }}>
          <IconTile icon="shield" tone="green" />
          <IconTile icon="calendar" tone="amber" />
          <IconTile icon="file" tone="coral" />
          <IconTile icon="star" tone="blue" />
          <IconTile icon="plane" tone="brand" />
        </div>
      </React.Fragment>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
