<!-- @dsCard group="Components" viewport="700x520" name="Product patterns" subtitle="TabBar, SectionHeading, SegmentedControl, ChecklistItem, NavItem" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--surface-app); font-family: var(--font-body); }
  #root { padding: 24px; display: flex; flex-direction: column; gap: 20px; }
  .rail { width: 210px; background: var(--blue-700); border-radius: var(--radius-lg); padding: 12px; display: flex; flex-direction: column; gap: 3px; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { TabBar, SectionHeading, SegmentedControl, ChecklistItem, NavItem } = window.AidPilotDesignSystem_59a3d7;
  const { useState } = React;
  function Demo() {
    const [tab, setTab] = useState("protect");
    const [top, setTop] = useState("home");
    const [tasks, setTasks] = useState({ fafsa: true, tax: false });
    return (
      <React.Fragment>
        <TabBar active={top} onChange={setTop} tabs={[
          {key:"home",label:"Home",icon:"grid"},{key:"fafsa",label:"FAFSA",icon:"clipboard"},
          {key:"money",label:"Aid & Money",icon:"star"},{key:"tasks",label:"Docs & Dates",icon:"calendar"}]} />
        <SectionHeading eyebrow="Your weekly check-in" title="One glance. You know what matters." size="md" />
        <SegmentedControl value={tab} onChange={setTab} size="sm"
          options={[{value:"protect",label:"Protect aid"},{value:"deadlines",label:"Catch deadlines"},{value:"scholarships",label:"Find scholarships"}]} />
        <div style={{ display: "grid", gridTemplateColumns: "1fr 210px", gap: 20, alignItems: "start" }}>
          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            <ChecklistItem title="Submit your FAFSA" sub="Federal aid application"
              done={tasks.fafsa} onToggle={() => setTasks(t => ({...t, fafsa: !t.fafsa}))} />
            <ChecklistItem title="Upload your 2024 tax return" sub="Needed for verification"
              badge="Needs upload" badgeTone="coral"
              done={tasks.tax} onToggle={() => setTasks(t => ({...t, tax: !t.tax}))} />
          </div>
          <div className="rail">
            <NavItem icon="grid" label="Dashboard" active />
            <NavItem icon="shield" label="Protect Aid" />
            <NavItem icon="calendar" label="Deadlines" />
            <NavItem icon="star" label="Schools" tag="Soon" />
          </div>
        </div>
      </React.Fragment>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
