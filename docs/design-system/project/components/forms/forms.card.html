<!-- @dsCard group="Components" viewport="700x420" name="Form controls" subtitle="TextField, Select, Checkbox, OptionCard" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--surface-card); font-family: var(--font-body); }
  #root { padding: 24px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .col { display: flex; flex-direction: column; gap: 14px; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { TextField, Select, Checkbox, OptionCard } = window.AidPilotDesignSystem_59a3d7;
  const { useState } = React;
  function Demo() {
    const [aid, setAid] = useState(true);
    const [goal, setGoal] = useState("protect");
    return (
      <React.Fragment>
        <div className="col">
          <TextField label="Email" type="email" placeholder="you@school.edu" defaultValue="maya@uci.edu" />
          <Select label="Year" options={["Freshman","Sophomore","Junior","Senior","Transfer","Graduate"]} defaultValue="Sophomore" />
          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            <Checkbox checked={aid} onChange={() => setAid(!aid)} label="Pell Grant" />
            <Checkbox checked={!aid} onChange={() => setAid(!aid)} label="Work-study" />
          </div>
        </div>
        <div className="col">
          <OptionCard icon="shield" title="Protect my aid" description="Watch eligibility & requirements"
            selected={goal === "protect"} onClick={() => setGoal("protect")} />
          <OptionCard icon="calendar" title="Catch deadlines" description="FAFSA, Cal Grant, school dates"
            selected={goal === "deadlines"} onClick={() => setGoal("deadlines")} />
          <OptionCard icon="star" title="Find scholarships" description="Matched to you every week"
            selected={goal === "scholarships"} onClick={() => setGoal("scholarships")} />
        </div>
      </React.Fragment>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
