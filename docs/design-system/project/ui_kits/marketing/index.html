<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AidPilot — Protect your aid. Find more college money every week.</title>
<link rel="stylesheet" href="../../styles.css" />
<style>
  html, body { margin: 0; }
  body { background: var(--surface-page); font-family: var(--font-body); color: var(--ink-800); overflow-x: hidden; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel" src="MarketingNav.jsx"></script>
<script type="text/babel" src="MarketingHero.jsx"></script>
<script type="text/babel" src="MarketingSections.jsx"></script>
<script type="text/babel">
  function Site() {
    const ctaRef = React.useRef(null);
    const goToCTA = () => {
      const el = ctaRef.current;
      if (el) window.scrollTo({ top: el.offsetTop - 40, behavior: "smooth" });
    };
    return (
      <React.Fragment>
        <window.MarketingNav onCTA={goToCTA} />
        <window.Hero onCTA={goToCTA} />
        <window.HowItWorks />
        <div ref={ctaRef}><window.Closer /></div>
        <window.MarketingFooter />
      </React.Fragment>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Site />);
</script>
</body>
</html>
